            padding: 20px;
            justify-content: center;

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #000000;
            border-radius: 12px;
            padding: 10px;
            width: 340px; /* 320 + padding */
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        .svg-preview {
            width: 320px;
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000000;
        }
        .svg-preview svg {
            width: 320px;
            height: 240px;
        }
        p {
            margin: 10px 0 0 0;
            font-size: 14px;
            text-transform: capitalize;
